<div class="step-content" [formGroup]="form">
  <div class="form-group">
    <label for="previousCampaigns">الحملات السابقة</label>
    <textarea 
      id="previousCampaigns" 
      formControlName="previousCampaigns" 
      placeholder="اذكر الحملات التسويقية التي شاركت فيها سابقاً"
      class="form-textarea"
      rows="3"
      (blur)="onFieldBlur('previousCampaigns')" 
      (input)="onFieldChange('previousCampaigns')"
    ></textarea>
  </div>

  <div class="form-group">
    <label for="campaignResults">نتائج الحملات *</label>
    <select id="campaignResults" formControlName="campaignResults" class="form-select" (blur)="onFieldBlur('campaignResults')" (change)="onFieldChange('campaignResults')">
      <option value="">اختر نتائج الحملات</option>
      <option value="very_positive">إيجابية جداً</option>
      <option value="positive">إيجابية</option>
      <option value="neutral">محايدة</option>
      <option value="negative">سلبية</option>
      <option value="very_negative">سلبية جداً</option>
    </select>
    <div class="error-message" *ngIf="getErrorMessage('campaignResults')">
      {{ getErrorMessage('campaignResults') }}
    </div>
  </div>

  <div class="form-group">
    <label for="budget">الميزانية المتاحة *</label>
    <select id="budget" formControlName="budget" class="form-select" (blur)="onFieldBlur('budget')" (change)="onFieldChange('budget')">
      <option value="">اختر الميزانية</option>
      <option value="under_1000">أقل من 1,000 ريال</option>
      <option value="1000_5000">1,000 - 5,000 ريال</option>
      <option value="5000_10000">5,000 - 10,000 ريال</option>
      <option value="10000_50000">10,000 - 50,000 ريال</option>
      <option value="over_50000">أكثر من 50,000 ريال</option>
    </select>
    <div class="error-message" *ngIf="getErrorMessage('budget')">
      {{ getErrorMessage('budget') }}
    </div>
  </div>
</div>
