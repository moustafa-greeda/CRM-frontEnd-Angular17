<div class="step-content personal-data-form" [formGroup]="form">
  <div class="form-row">
    <div class="form-column">
      <div class="form-group">
        <label for="jobTitle">المسمى الوظيفي *</label>
        <select id="jobTitle" formControlName="jobTitle" class="form-select" (blur)="onFieldBlur('jobTitle')" (change)="onFieldChange('jobTitle')">
          <option value="">إختر المسمى الوظيفي</option>
          <option value="manager">مدير</option>
          <option value="developer">مطور</option>
          <option value="analyst">محلل</option>
        </select>
        <div class="error-message" *ngIf="getErrorMessage('jobTitle')">
          {{ getErrorMessage('jobTitle') }}
        </div>
      </div>

      <div class="form-group">
        <label for="customerLevel">مستوى العميل *</label>
        <select id="customerLevel" formControlName="customerLevel" class="form-select" (blur)="onFieldBlur('customerLevel')" (change)="onFieldChange('customerLevel')">
          <option value="">إختر مستوى العميل</option>
          <option value="gold">ذهبي</option>
          <option value="silver">فضي</option>
          <option value="bronze">برونزي</option>
        </select>
        <div class="error-message" *ngIf="getErrorMessage('customerLevel')">
          {{ getErrorMessage('customerLevel') }}
        </div>
      </div>

      <div class="form-group">
        <label for="personalityType">نوع الشخصية *</label>
        <select id="personalityType" formControlName="personalityType" class="form-select" (blur)="onFieldBlur('personalityType')" (change)="onFieldChange('personalityType')">
          <option value="">إختر نوع الشخصية</option>
          <option value="introvert">انطوائي</option>
          <option value="extrovert">منفتح</option>
          <option value="ambivert">متوازن</option>
        </select>
        <div class="error-message" *ngIf="getErrorMessage('personalityType')">
          {{ getErrorMessage('personalityType') }}
        </div>
      </div>
    </div>

    <div class="form-column">
      <div class="form-group">
        <label for="email">البريد الإلكتروني *</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email" 
          placeholder="أدخل البريد الإلكتروني"
          class="form-input"
          (blur)="onFieldBlur('email')" (input)="onFieldChange('email')"
        >
        <div class="error-message" *ngIf="getErrorMessage('email')">
          {{ getErrorMessage('email') }}
        </div>
      </div>

      <div class="form-group">
        <label for="department">القسم *</label>
        <select id="department" formControlName="department" class="form-select" (blur)="onFieldBlur('department')" (change)="onFieldChange('department')">
          <option value="">إختر القسم</option>
          <option value="it">تقنية المعلومات</option>
          <option value="hr">الموارد البشرية</option>
          <option value="finance">المالية</option>
        </select>
        <div class="error-message" *ngIf="getErrorMessage('department')">
          {{ getErrorMessage('department') }}
        </div>
      </div>

      <div class="form-group">
        <label for="language">اللغة *</label>
        <select id="language" formControlName="language" class="form-select" (blur)="onFieldBlur('language')" (change)="onFieldChange('language')">
          <option value="">إختر اللغة</option>
          <option value="arabic">العربية</option>
          <option value="english">الإنجليزية</option>
          <option value="french">الفرنسية</option>
        </select>
        <div class="error-message" *ngIf="getErrorMessage('language')">
          {{ getErrorMessage('language') }}
        </div>
      </div>
    </div>
  </div>
</div>
