<div class="step-content" [formGroup]="form">
  <div class="form-group">
    <label for="purchaseIntention">نية الشراء *</label>
    <select id="purchaseIntention" formControlName="purchaseIntention" class="form-select" (blur)="onFieldBlur('purchaseIntention')" (change)="onFieldChange('purchaseIntention')">
      <option value="">اختر نية الشراء</option>
      <option value="immediate">فوري (خلال شهر)</option>
      <option value="short_term">قصير المدى (3-6 أشهر)</option>
      <option value="medium_term">متوسط المدى (6-12 شهر)</option>
      <option value="long_term">طويل المدى (أكثر من سنة)</option>
      <option value="no_intention">لا توجد نية للشراء</option>
    </select>
    <div class="error-message" *ngIf="getErrorMessage('purchaseIntention')">
      {{ getErrorMessage('purchaseIntention') }}
    </div>
  </div>

  <div class="form-group">
    <label for="timeFrame">الإطار الزمني المتوقع *</label>
    <select id="timeFrame" formControlName="timeFrame" class="form-select" (blur)="onFieldBlur('timeFrame')" (change)="onFieldChange('timeFrame')">
      <option value="">اختر الإطار الزمني</option>
      <option value="1_month">شهر واحد</option>
      <option value="3_months">3 أشهر</option>
      <option value="6_months">6 أشهر</option>
      <option value="1_year">سنة واحدة</option>
      <option value="more_than_year">أكثر من سنة</option>
    </select>
    <div class="error-message" *ngIf="getErrorMessage('timeFrame')">
      {{ getErrorMessage('timeFrame') }}
    </div>
  </div>

  <div class="form-group">
    <label for="priority">أولوية الشراء *</label>
    <select id="priority" formControlName="priority" class="form-select" (blur)="onFieldBlur('priority')" (change)="onFieldChange('priority')">
      <option value="">اختر الأولوية</option>
      <option value="high">عالية</option>
      <option value="medium">متوسطة</option>
      <option value="low">منخفضة</option>
      <option value="urgent">عاجلة</option>
    </select>
    <div class="error-message" *ngIf="getErrorMessage('priority')">
      {{ getErrorMessage('priority') }}
    </div>
  </div>
</div>
