<div class="filter-leads-container">
  
  <!-- Navigation Tabs -->
  <div class="nav-tabs">
    <button 
      class="nav-tab" 
      [class.active]="activeTab === 'personal'"
      (click)="setActiveTab('personal')">
      <!-- <span class="tab-icon">👤</span> -->
      <span class="tab-label">البيانات الشخصية</span>
      <!-- <span class="tab-count">{{ personalDataFiltered.length }}</span> -->
      <!-- Arrow for active tab -->
      <div class="tab-arrow" *ngIf="activeTab === 'personal'">
        <mat-icon>keyboard_arrow_down</mat-icon>
      </div>
    </button>
    
    <button 
      class="nav-tab" 
      [class.active]="activeTab === 'company'"
      (click)="setActiveTab('company')">
      <!-- <span class="tab-icon">🏢</span> -->
      <span class="tab-label">بيانات الشركة</span>
      <!-- <span class="tab-count">{{ companyDataFiltered.length }}</span> -->
      <!-- Arrow for active tab -->
      <div class="tab-arrow" *ngIf="activeTab === 'company'">
        <mat-icon>keyboard_arrow_down</mat-icon>
      </div>
    </button>
    
    <button 
      class="nav-tab" 
      [class.active]="activeTab === 'all'"
      (click)="setActiveTab('all')">
      <!-- <span class="tab-icon">📊</span> -->
      <span class="tab-label">جميع البيانات</span>
      <!-- <span class="tab-count">{{ personalDataFiltered.length + companyDataFiltered.length }}</span> -->
      <!-- Arrow for active tab -->
      <div class="tab-arrow" *ngIf="activeTab === 'all'">
        <mat-icon>keyboard_arrow_down</mat-icon>
      </div>
    </button>
  </div>
  

  <!-- Table Components -->
  <div class="tables-container">
    <!-- Personal Data Table -->
    <div *ngIf="activeTab === 'personal' || activeTab === 'all'" class="">
      <app-personal-data-table 
        [data]="personalData"
        (filteredDataChange)="onPersonalDataFiltered($event)"
        (selectedRowsChange)="onPersonalDataSelected($event)">
      </app-personal-data-table>
    </div>

    <!-- Company Table -->
    <div *ngIf="activeTab === 'company' || activeTab === 'all'" class="">
      <app-company-table 
        [data]="companyData"
        (filteredDataChange)="onCompanyDataFiltered($event)"
        (selectedRowsChange)="onCompanyDataSelected($event)">
      </app-company-table>
    </div>
  </div>
