<div class="parent-container">
  <!-- page header -->
  <app-page-header
    [title]="pageTitle"
    [breadcrumb]="breadcrumb"
    [actionButtons]="actionButtons"
  ></app-page-header>

  <!-------------- filter drop down  ------------->
  <div class="filter-dropdown">
    <div class="filter-dropdown-item" *ngFor="let dd of filterDropdowns">
      <div
        class="custom-dropdown"
        [class.open]="dd.open"
        appClickOutside
        (appClickOutside)="dd.open = false"
      >
        <button
          class="dropdown-trigger"
          type="button"
          (click)="toggleDropdown(dd)"
        >
          <span class="selected-option">{{ dd.selected || dd.label }}</span>
          <i class="bi bi-chevron-down dropdown-arrow"></i>
        </button>
        <div class="dropdown-menu">
          <div
            class="dropdown-item"
            *ngFor="let opt of dd.options"
            (click)="selectOption(dd, opt)"
          >
            <i class="bi bi-dot"></i>
            <span>{{ opt }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!--------------- import and export ------------>
  <div class="filter border-gradient thin">
    <!--parent import -->
    <div class="parent-search">
      <!-- search input -->
      <app-search-input></app-search-input>

  <!-- grid cards -->
  <app-grid-cards [isLoading]="false" [error]="false">
    <app-card
      *ngFor="let company of companyList$ | async; trackBy: trackByCompanyId"
      [data]="company"
      [selectable]="true"
      [titleKey]="'name'"
      [subTitleKey]="'departmentName'"
      [fields]="[
        { label: 'البريد الإلكتروني', key: 'email', icon: 'bi bi-envelope' },
