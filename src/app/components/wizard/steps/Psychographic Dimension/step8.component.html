<div class="step-content" [formGroup]="form">
  <div class="form-group">
    <label for="personality">نوع الشخصية *</label>
    <select id="personality" formControlName="personality" class="form-select" (blur)="onFieldBlur('personality')" (change)="onFieldChange('personality')">
      <option value="">اختر نوع الشخصية</option>
      <option value="analytical">تحليلي</option>
      <option value="driver">قائد</option>
      <option value="expressive">تعبيري</option>
      <option value="amiable">ودود</option>
    </select>
    <div class="error-message" *ngIf="getErrorMessage('personality')">
      {{ getErrorMessage('personality') }}
    </div>
  </div>

  <div class="form-group">
    <label for="motivation">الدافع الرئيسي *</label>
    <select id="motivation" formControlName="motivation" class="form-select" (blur)="onFieldBlur('motivation')" (change)="onFieldChange('motivation')">
      <option value="">اختر الدافع الرئيسي</option>
      <option value="price">السعر</option>
      <option value="quality">الجودة</option>
      <option value="service">الخدمة</option>
      <option value="convenience">الراحة</option>
      <option value="status">الوضع الاجتماعي</option>
    </select>
    <div class="error-message" *ngIf="getErrorMessage('motivation')">
      {{ getErrorMessage('motivation') }}
    </div>
  </div>

  <div class="form-group">
    <label for="decisionPattern">نمط اتخاذ القرار *</label>
    <select id="decisionPattern" formControlName="decisionPattern" class="form-select" (blur)="onFieldBlur('decisionPattern')" (change)="onFieldChange('decisionPattern')">
      <option value="">اختر نمط اتخاذ القرار</option>
      <option value="quick">سريع</option>
      <option value="deliberate">مدروس</option>
      <option value="collaborative">تعاوني</option>
      <option value="independent">مستقل</option>
    </select>
    <div class="error-message" *ngIf="getErrorMessage('decisionPattern')">
      {{ getErrorMessage('decisionPattern') }}
    </div>
  </div>
</div>
