<div class="dashboard-layout" [ngClass]="{ 'sidebar-open': isSidebarOpen }">
  <app-nav class="header" (menuToggle)="toggleSidebar()"></app-nav>
  <app-sidebar class="sidebar" (click)="$event.stopPropagation()"></app-sidebar>
  <div class="backdrop" *ngIf="isSidebarOpen" (click)="closeSidebar()"></div>
  <div class="content">
    <router-outlet></router-outlet>
  </div>
  <app-footer class="footer"></app-footer>
</div>
