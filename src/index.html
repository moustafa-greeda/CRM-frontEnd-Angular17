<!DOCTYPE html>
<html lang="en" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <title>Data Center</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- <link rel="icon" type="image/png" href="assets/icon-elbatt.png" /> -->
    <link rel="icon" type="image/png" href="assets/icon-elbatt.png" />

    <!-- font cairo -->
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&family=Comic+Relief:wght@400;700&family=Prata&display=swap");
    </style>
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("theme");
          var system =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          var theme = saved || system;
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
