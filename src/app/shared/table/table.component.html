<div class="table-wrapper mat-elevation-z8 hover-elevate">
  <table
    mat-table
    [dataSource]="data"
    matSort
    (matSortChange)="emitSort($event)"
    class="full-width-table"
  >
    <ng-container *ngFor="let col of columns" [matColumnDef]="col.key">
      <th
        mat-header-cell
        *matHeaderCellDef
        [mat-sort-header]="col.key"
        [disabled]="!col.sortable"
        class="header-cell"
      >
        {{ col.header }}
      </th>

      <td mat-cell *matCellDef="let row" class="data-cell">
        <ng-container *ngIf="col.key !== 'actions'; else actionsTpl">
          {{ getValue(row, col.key) }}
        </ng-container>
        <ng-template #actionsTpl>
          <button
            mat-icon-button
            color="primary"
            matTooltip="Edit"
            (click)="edit.emit(row)"
            class="action-btn"
          >
            <mat-icon>edit</mat-icon>
          </button>
          <button
            mat-icon-button
            color="warn"
            matTooltip="Delete"
            (click)="delete.emit(row)"
            class="action-btn"
          >
            <mat-icon>delete</mat-icon>
          </button>
        </ng-template>
      </td>
    </ng-container>

    <!-- Header sticky -->
    <tr
      mat-header-row
      *matHeaderRowDef="displayedColumnKeys; sticky: true"
      class="header-row"
    ></tr>

    <tr
      mat-row
      *matRowDef="let row; columns: displayedColumnKeys"
      class="data-row"
      (click)="rowClick.emit(row)"
    ></tr>
  </table>

  <mat-paginator
    [length]="total"
    [pageIndex]="pageIndex"
    [pageSize]="pageSize"
    [pageSizeOptions]="pageSizeOptions"
    (page)="emitPage($event)"
    class="paginator"
    showFirstLastButtons
  >
  </mat-paginator>
</div>
