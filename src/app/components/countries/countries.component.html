<!-- Head + actions -->
<div class="page-header" dir="rtl">
	<div class="title">إدارة الدول</div>
	<div class="actions">
		<button mat-raised-button color="primary">الرئيسية</button>
	</div>
</div>

<div class="search-box">
    <input type="text" placeholder="بحث..." [formControl]="search"/>
    <mat-icon class="search-icon">search</mat-icon>
  </div>

<!-- Two columns -->
<div class="grid-2" dir="rtl">
	<!-- Left: custom form (no Angular Material) -->
	<div class="panel form-card">
		<div class="form-title">إضافة دولة جديدة</div>

		<form [formGroup]="countryForm" class="form">
			<label class="field">
				<span class="label">اسم الدولة</span>
				<input class="input" type="text" formControlName="name" placeholder="أدخل اسم الدولة" />
				<small class="hint" *ngIf="countryForm.get('name')?.invalid && countryForm.get('name')?.touched">
					مطلوب
				</small>
			</label>

			<label class="field">
				<span class="label">كود الاتصال</span>
				<div class="input-with-prefix">
					<span class="prefix">+</span>
					<input class="input naked" type="text" formControlName="keyCode" placeholder="966" />
				</div>
				<small class="hint" *ngIf="countryForm.get('keyCode')?.invalid && countryForm.get('keyCode')?.touched">
					مطلوب
				</small>
			</label>

			<div class="actions">
				<button type="button" class="btn btn-ghost" (click)="clearForm()">مسح</button>
				<button type="button" class="btn btn-accent" (click)="onSaveCountry()">
					{{ isEditMode ? 'تحديث' : 'حفظ' }}
				</button>
				<button *ngIf="isEditMode" type="button" class="btn btn-outline" (click)="cancelEdit()">إلغاء</button>
			</div>
		</form>
	</div>

	<!-- Right: table -->
	<mat-card class="panel">
		<table mat-table [dataSource]="(pagedCountries$ | async) ?? []" class="full-width-table">

			<ng-container matColumnDef="index">
				<th mat-header-cell *matHeaderCellDef>#</th>
				<td mat-cell *matCellDef="let c; let i = index">{{ i + 1 }}</td>
			</ng-container>

			<ng-container matColumnDef="name">
				<th mat-header-cell *matHeaderCellDef>اسم الدولة</th>
				<td mat-cell *matCellDef="let c">{{ c.name }}</td>
			</ng-container>

			<ng-container matColumnDef="keyCode">
				<th mat-header-cell *matHeaderCellDef>كود الهاتف</th>
				<td mat-cell *matCellDef="let c">{{ c.keyCode }}</td>
			</ng-container>

			<ng-container matColumnDef="actions">
				<th mat-header-cell *matHeaderCellDef>الإجراءات</th>
				<td mat-cell *matCellDef="let c">
					<button mat-icon-button color="primary" (click)="onEditCountry(c)">
						<mat-icon>edit</mat-icon>
					</button>
					<button mat-icon-button color="warn" (click)="onDeleteCountry(c.id)">
						<mat-icon>delete</mat-icon>
					</button>
				</td>
			</ng-container>

			<tr mat-header-row *matHeaderRowDef="['index','name','keyCode','actions']"></tr>
			<tr mat-row
    *matRowDef="let row; columns: ['index','name','keyCode','actions']; let odd = odd; let even = even"
    [ngClass]="{ 'row-odd': odd, 'row-even': even }">
			</tr>
		</table>

		<mat-paginator
			[length]="totalCountriesCount"
			[pageIndex]="pageIndex"
			[pageSize]="pageSize"
			[pageSizeOptions]="[10, 20, 50, 100, 500, 1000]"
			(page)="onPageChange($event)">
		</mat-paginator>
	</mat-card>
</div>
