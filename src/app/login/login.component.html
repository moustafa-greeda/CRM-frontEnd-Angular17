<div class="parent">
  <div class="section">
    <div class="logo">
      <img src="assets/logo_elbatt.png" alt="logo elbatt" />
    </div>
    <h1>تسجيل الدخول</h1>
    <form (submit)="loginUser()" class="form-login">
      <!-- input user name  -->
      <div class="form-login">
        <label for="name">اسم المستخدم</label>
        <input
          id="name"
          type="text"
          name="login"
          [(ngModel)]="login"
          placeholder="إدخل  إسم المستخدم"
          required
        />
        <small class="error" *ngIf="fieldErrors['login']">
          {{ fieldErrors["login"] }}
        </small>
      </div>

      <!-- input password  -->
      <div class="form-login">
        <label for="password">كلمة المرور</label>
        <input
          id="password"
          type="password"
          name="password"
          [(ngModel)]="password"
          placeholder="ادخل كلمة المرور"
          required
        />
        <small class="error" *ngIf="fieldErrors['password']">
          {{ fieldErrors["password"] }}
        </small>
      </div>

      <div class="check-group">
        <p>نسيت كلمة السر</p>
        <input type="checkbox" />
      </div>
      <button type="submit">متابعه</button>

      <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
    </form>
  </div>
</div>
