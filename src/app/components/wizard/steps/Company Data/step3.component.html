<div class="step-content company-data-form" [formGroup]="form">
  <div class="form-row">
    <div class="form-group">
       <label for="companyName">إسم الشركة</label>
      <input 
        type="text" 
        id="companyName" 
        formControlName="companyName" 
        placeholder="أدخل إسم الشركة"
        class="form-input"
        (blur)="onFieldBlur('companyName')" 
        (input)="onFieldChange('companyName')"
      >
      <div class="error-message" *ngIf="getErrorMessage('companyName')">
        {{ getErrorMessage('companyName') }}
      </div>
    </div>
    <div class="form-group">
       <label for="industry">الصناعة</label>
      <input 
        type="text" 
        id="industry" 
        formControlName="industry" 
        placeholder="أدخل الصناعة"
        class="form-input"
        (blur)="onFieldBlur('industry')" 
        (input)="onFieldChange('industry')"
      >
      <div class="error-message" *ngIf="getErrorMessage('industry')">
        {{ getErrorMessage('industry') }}
      </div>
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
       <label for="companyStage">مرحلة الشركة</label>
      <input 
        type="text" 
        id="companyStage" 
        formControlName="companyStage" 
        placeholder="أدخل مرحلة الشركة"
        class="form-input"
        (blur)="onFieldBlur('companyStage')" 
        (input)="onFieldChange('companyStage')"
      >
      <div class="error-message" *ngIf="getErrorMessage('companyStage')">
        {{ getErrorMessage('companyStage') }}
      </div>
    </div>

    <div class="form-group">
       <label for="companySize">حجم الشركة</label>
      <input 
        type="text" 
        id="companySize" 
        formControlName="companySize" 
        placeholder="أدخل حجم الشركة"
        class="form-input"
        (blur)="onFieldBlur('companySize')" 
        (input)="onFieldChange('companySize')"
      >
      <div class="error-message" *ngIf="getErrorMessage('companySize')">
        {{ getErrorMessage('companySize') }}
      </div>
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
       <label for="location">الموقع</label>
      <input 
        type="text" 
        id="location" 
        formControlName="location" 
        placeholder="أدخل الموقع"
        class="form-input"
        (blur)="onFieldBlur('location')" 
        (input)="onFieldChange('location')"
      >
      <div class="error-message" *ngIf="getErrorMessage('location')">
        {{ getErrorMessage('location') }}
      </div>
    </div>

    <div class="form-group">
       <label for="digitalTransformation">التحول الرقمي</label>
      <div class="radio-group">
        <label class="radio-item" [class.selected]="form.get('digitalTransformation')?.value === 'yes'">
          <input 
            type="radio" 
            name="digitalTransformation" 
            value="yes" 
            formControlName="digitalTransformation"
            (change)="onFieldChange('digitalTransformation')"
          >
          <span>نعم</span>
        </label>
        <label class="radio-item" [class.selected]="form.get('digitalTransformation')?.value === 'no'">
          <input 
            type="radio" 
            name="digitalTransformation" 
            value="no" 
            formControlName="digitalTransformation"
            (change)="onFieldChange('digitalTransformation')"
          >
          <span>لا</span>
        </label>
      </div>
      <div class="error-message" *ngIf="getErrorMessage('digitalTransformation')">
        {{ getErrorMessage('digitalTransformation') }}
      </div>
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
       <label for="ownership">الملكية</label>
      <input 
        type="text" 
        id="ownership" 
        formControlName="ownership" 
        placeholder="أدخل نوع الملكية"
        class="form-input"
        (blur)="onFieldBlur('ownership')" 
        (input)="onFieldChange('ownership')"
      >
      <div class="error-message" *ngIf="getErrorMessage('ownership')">
        {{ getErrorMessage('ownership') }}
      </div>
    </div>

    <div class="form-group">
       <label for="branches">الفروع</label>
      <input 
        type="text" 
        id="branches" 
        formControlName="branches" 
        placeholder="أدخل عدد الفروع"
        class="form-input"
        (blur)="onFieldBlur('branches')" 
        (input)="onFieldChange('branches')"
      >
      <div class="error-message" *ngIf="getErrorMessage('branches')">
        {{ getErrorMessage('branches') }}
      </div>
    </div>
  </div>
</div>
